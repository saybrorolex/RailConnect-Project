services:
  - type: web
    name: railconnect
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'app:app' --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: railconnect-db
          property: connectionString

databases:
  - name: railconnect-db
    databaseName: railconnect
    plan: free
