{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-form">
  <h2>Welcome Back</h2>
  <p>Sign in to your RailMS account</p>

  <form method="POST">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required autofocus/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required/>
    </div>
    <div class="form-group" style="flex-direction:row; align-items:center; gap:8px;">
      <input type="checkbox" name="remember" id="remember" style="width:auto;"/>
      <label for="remember" style="text-transform:none; letter-spacing:0; font-size:13px; color:var(--white-dim);">Remember me</label>
    </div>
    <button type="submit" class="btn btn-primary">
      <i class="fas fa-right-to-bracket"></i> Sign In
    </button>
  </form>

  <p class="auth-switch">
    Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
  </p>
</div>
{% endblock %}
